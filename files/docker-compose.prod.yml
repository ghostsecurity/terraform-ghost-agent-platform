# Ghost Agent Platform — production docker-compose for a single-VM
# deployment. Cloud-init writes this file to /opt/exo/ on the host;
# the operator runs `docker compose -f docker-compose.prod.yml ...`
# from there.
#
# All stateful data lives on the EBS data volume mounted at
# /var/lib/exo. Image registry + tag are substituted from /opt/exo/.env
# (populated by cloud-init from module variables). Caddy is the only
# service that publishes host ports.
#
# Operator update flow (after a new image tag is published):
#
# Preferred: a workspace admin clicks "Upgrade" in the UI under the
# workspace dropdown → System → Version. The exo-updater container
# handles the .env rewrite + `docker compose pull` + `up -d` for the
# four managed services (gateway, credential-proxy, worker, ui).
#
# To bump the exo-updater image itself (excluded from in-stack
# upgrades to avoid recreating the container running the upgrade):
#   ssh ec2-user@<host>
#   cd /opt/exo
#   sudo sed -i 's/^UPDATER_TAG=.*/UPDATER_TAG=vX.Y.Z/' .env
#   sudo docker compose -f docker-compose.prod.yml up -d exo-updater
#
# Break-glass (when the UI / updater itself is broken):
#   ssh ec2-user@<host>
#   cd /opt/exo
#   sudo sed -i 's/^TAG=.*/TAG=vX.Y.Z/' .env
#   sudo docker compose -f docker-compose.prod.yml pull
#   sudo docker compose -f docker-compose.prod.yml up -d

services:
  # Oneshot that normalizes ownership on the shared TLS + artifacts
  # bind mounts before any long-running service mounts them, then exits
  # (`restart: "no"`). Cloud-init already chowns these dirs on the EBS
  # data volume at instance provisioning, but it does NOT re-run on the
  # default in-place upgrade path (the in-stack updater's `up -d`). So an
  # instance provisioned before the non-root images keeps root-owned
  # /var/lib/exo/{tls,artifacts} and would break when bumped to images
  # that run as UID 65532. This root oneshot re-asserts ownership on every
  # `up -d`; on a freshly provisioned host it's a no-op. Mirrors the
  # ui-extract oneshot pattern - the long-running service images stay
  # non-root.
  #   tls         private keys, 0700, read by gateway + proxy + updater
  #   tls-public  world-readable (0755) - worker reads ca.crt as its agent user
  #   artifacts   2775 setgid so files written by the gateway (65532) and
  #               the worker's agent user (supplementary member of gid 65532)
  #               stay mutually readable
  volume-init:
    image: busybox
    user: "0:0"
    restart: "no"
    command:
      - /bin/sh
      - -c
      - |
        set -e
        chown -R 65532:65532 /tls /tls-public /artifacts
        chmod 0700 /tls
        chmod 0755 /tls-public
        chmod 2775 /artifacts
    volumes:
      - /var/lib/exo/tls:/tls
      - /var/lib/exo/tls-public:/tls-public
      - /var/lib/exo/artifacts:/artifacts

  gateway:
    image: ${REGISTRY}/exo-server:${TAG}
    restart: unless-stopped
    command: [ "-config", "/etc/exo/config.toml" ]
    environment:
      # FIPS 140-3 mode. GOFIPS140 selects the validated crypto module
      # at build time; GODEBUG=fips140=on activates it at runtime;
      # EXO_REQUIRE_FIPS makes startup fatal if FIPS isn't active.
      GOFIPS140: latest
      GODEBUG: fips140=on
      EXO_REQUIRE_FIPS: "true"
      # Gateway secrets injected from /opt/exo/.env rather than config.toml,
      # so config.toml stays non-secret and the non-root gateway can read it.
      EXO_JWT_SECRET: ${EXO_JWT_SECRET:?EXO_JWT_SECRET must be set in /opt/exo/.env}
      EXO_SEED_ADMIN_PASSWORD: ${EXO_SEED_ADMIN_PASSWORD:?EXO_SEED_ADMIN_PASSWORD must be set in /opt/exo/.env}
      # Channel connectors. Sourced from /opt/exo/.env (which cloud-init
      # populates from AWS Secrets Manager). Empty defaults so a missing
      # secret doesn't break compose substitution.
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      # UI-driven upgrade dispatch. The gateway dials the updater
      # at this URL over mTLS — both legs of the handshake anchor in
      # the same service CA the credential-proxy bootstraps. Empty
      # disables the gateway-side feature (it would still run, just
      # report feature_enabled=false to the UI).
      UPDATER_URL: https://exo-updater:8080
      # Explicit even though true is the default — makes the
      # production posture self-evident from this file.
      SYSTEM_UPGRADE_ENABLED: "true"
    volumes:
      - /opt/exo/config.toml:/etc/exo/config.toml:ro
      - /var/lib/exo/artifacts:/var/lib/exo/artifacts
      - /var/lib/exo/tls:/var/lib/exo/tls
    networks:
      internal:
        ipv4_address: 172.28.0.11
      database:
      external:
    depends_on:
      volume-init:
        condition: service_completed_successfully
      database:
        condition: service_healthy
      credential-proxy:
        condition: service_started

  # Only component with ENCRYPTION_KEY. Holds the MITM CA private key
  # and the service CA private key. NOT reachable from outside the VM:
  # the MITM (:443), control plane (:8444), and DNS (:53) listeners are
  # bridge-only.
  credential-proxy:
    image: ${REGISTRY}/exo-credential-proxy:${TAG}
    restart: unless-stopped
    command: [ "-config", "/etc/exo/config.proxy.toml" ]
    # The proxy runs as the non-root UID 65532 but binds the privileged
    # ports :443 (MITM) and :53 (DNS). Lowering the unprivileged-port floor
    # to 0 lets it bind them without CAP_NET_BIND_SERVICE or root.
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=0
    environment:
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in /opt/exo/.env}
      GOFIPS140: latest
      GODEBUG: fips140=on
      EXO_REQUIRE_FIPS: "true"
    volumes:
      - /opt/exo/config.proxy.toml:/etc/exo/config.proxy.toml:ro
      - /var/lib/exo/tls:/var/lib/exo/tls
      - /var/lib/exo/tls-public:/var/lib/exo/tls-public
    networks:
      # Fixed IP — workers' `dns:` directive depends on this and must
      # match [proxy].dns_proxy_ip in config.proxy.toml.
      internal:
        ipv4_address: 172.28.0.10
      database:
      external:
    depends_on:
      volume-init:
        condition: service_completed_successfully
      database:
        condition: service_healthy

  database:
    image: mongo:7
    restart: unless-stopped
    # Single-node replica set (rs0) — required for the change streams
    # the gateway tails on db.run_events.watch() for live UI updates.
    command: [ "--replSet", "rs0", "--bind_ip_all" ]
    volumes:
      - /var/lib/exo/mongo-data:/data/db
    networks:
      - database
    # Healthcheck doubles as one-time rs.initiate() bootstrap
    # (idempotent on subsequent boots).
    healthcheck:
      test:
        - CMD-SHELL
        - |
          mongosh --quiet --eval '
            try { rs.status() } catch (e) {
              rs.initiate({_id: "rs0", members: [{_id: 0, host: "database:27017"}]});
            }
          ' && mongosh --quiet --eval 'db.hello().isWritablePrimary'
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  worker:
    image: ${REGISTRY}/exo-worker:${TAG}
    restart: unless-stopped
    cap_drop:
      - ALL
    deploy:
      replicas: ${WORKER_REPLICAS:-2}
    environment:
      EXO_RUNNER_WS_URL: wss://gateway:8000/api/v1/runners/connect
      EXO_RUNNER_WORKER_TYPES: general
      EXO_RUNNER_CAPABILITIES: task
      EXO_RUNNER_SESSION_ROOT: /run/exo
      EXO_ARTIFACT_ROOT: /var/lib/exo/artifacts
      EXO_AGENT_EXTRA_CA_CERTS: /var/lib/exo/tls/ca.crt
      EXO_RUNNER_IDENTITY_DIR: /var/lib/exo/runner-identity
    volumes:
      # Bind-mounted /etc/resolv.conf — bypasses Docker's embedded DNS
      # resolver at 127.0.0.11, which on this stack returns SERVFAIL
      # when asked to forward to the credential-proxy's bridge IP.
      # The file (written once by cloud-init) lists 127.0.0.11 first
      # for stack-internal service discovery and 172.28.0.10 second so
      # every public hostname falls through to the proxy's DNS, which
      # answers with its own IP for MITM interception. See the comment
      # in user_data.sh.tpl for the full rationale.
      - /var/lib/exo/worker-resolv.conf:/etc/resolv.conf:ro
      - /var/lib/exo/artifacts:/var/lib/exo/artifacts
      # Worker sees ONLY the public CA cert — never the signing key.
      # tls-public mounts at /var/lib/exo/tls inside the container to
      # match EXO_AGENT_EXTRA_CA_CERTS above (which expects ca.crt at
      # that path).
      - /var/lib/exo/tls-public:/var/lib/exo/tls:ro
      - /var/lib/exo/runner-identity:/var/lib/exo/runner-identity
    networks:
      - internal
    depends_on:
      volume-init:
        condition: service_completed_successfully
      gateway:
        condition: service_started
      credential-proxy:
        condition: service_started

  # UI-driven container upgrade dispatcher. Only component that holds
  # the host's docker socket. Listens on the internal bridge only —
  # the gateway is the only thing that dials it, and the network's
  # `internal: true` plus the updater's mTLS gate (CN must match
  # `gw_<ulid>`) keep it unreachable from anything else.
  #
  # UPDATER_TAG is intentionally separate from TAG: every TAG bump
  # via `docker compose up -d` skips the updater itself (see the
  # explicit service list in the updater's compose runner), so the
  # updater image is bumped out of band by the operator running
  # `docker compose up -d exo-updater` after a release. See the
  # operator-update-flow comment block at the top of this file.
  exo-updater:
    image: ${REGISTRY}/exo-updater:${UPDATER_TAG:-${TAG}}
    restart: unless-stopped
    command: [ "-config", "/etc/exo/config.toml" ]
    # The image ships a non-root default user, but this container holds the
    # host docker socket - which is root-equivalent (it can launch a
    # privileged container) - so running the process as non-root buys no
    # real isolation.
    user: "0:0"
    environment:
      GOFIPS140: latest
      GODEBUG: fips140=on
      EXO_REQUIRE_FIPS: "true"
    volumes:
      # The updater's own config lives at /etc/exo/config.toml
      # (different in-container path → no overlap with /opt/exo
      # below). Mounting /opt/exo as a directory rather than its
      # individual files is deliberate: the updater's atomic .env
      # rewrite uses rename(2), and Linux refuses to rename over a
      # single-file bind mount (EBUSY). Mounting the parent
      # directory keeps the rename inside the bind, which works.
      # Security trade-off is small — the docker socket already
      # gives this container full host control, so visibility of
      # the other files under /opt/exo doesn't widen the blast
      # radius materially.
      - /opt/exo/config.toml:/etc/exo/config.toml:ro
      - /opt/exo:/opt/exo
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/exo/tls:/var/lib/exo/tls
      # The docker CLI inside this container needs auth to pull
      # from ECR — `docker compose pull` resolves credentials on
      # the client side, not via the daemon. Cloud-init does
      # `aws ecr get-login-password | docker login` on the host
      # (refreshed hourly by the ecr-login.timer systemd unit),
      # which populates /root/.docker/config.json on the host.
      # Bind-mounting that directory read-only into the container
      # lets the container's docker CLI use the host's existing
      # ECR auth without needing its own login flow.
      - /root/.docker:/root/.docker:ro
    networks:
      # Fixed IP on the internal bridge so the gateway's UPDATER_URL
      # hostname resolves predictably. The `external` network is
      # required for outbound HTTPS to the ECR API (DescribeImages)
      # and to IMDS at 169.254.169.254 for instance-profile creds —
      # `internal: true` blocks both. Reachability of the updater
      # from outside the host is still nil because no ports are
      # published, and the mTLS + gateway-CN gate inside the
      # listener narrows the trusted-caller set to the gateway.
      internal:
        ipv4_address: 172.28.0.12
      external:
    depends_on:
      # service_started, not service_healthy: the credential-proxy
      # writes updater.crt + updater.key synchronously during its own
      # startup, but the depends_on contract is "container exists",
      # not "ready". A startup check inside the updater (see
      # buildTLSConfig in cmd/updater/main.go) turns a missing cert
      # into a clean fatal, which docker's restart policy resolves
      # after ~1 cycle.
      credential-proxy:
        condition: service_started

  # Public TLS terminator + static UI server + /api reverse proxy.
  # The only service in this compose that publishes host ports.
  # Auto-LE: Caddy provisions and renews a Let's Encrypt cert for
  # ${DOMAIN} (either a real FQDN or <dashed-eip>.nip.io). Cert + LE
  # account state persist in /var/lib/exo/caddy-data across restarts.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/exo/Caddyfile:/etc/caddy/Caddyfile:ro
      - /var/lib/exo/caddy-data:/data
      - /var/lib/exo/caddy-config:/config
      - /var/lib/exo/ui:/srv/ui:ro
    networks:
      - internal
      - external
    depends_on:
      gateway:
        condition: service_started

  # Oneshot that copies the static UI bundle out of the exo-ui image
  # into the shared bind mount Caddy reads from. Runs once on each
  # `up -d`, then exits. `restart: "no"` keeps it from looping.
  ui-extract:
    image: ${REGISTRY}/exo-ui:${TAG}
    command: [ "/bin/sh", "-c", "cp -rT /usr/share/nginx/html /srv/ui" ]
    restart: "no"
    volumes:
      - /var/lib/exo/ui:/srv/ui

networks:
  # Stack-internal traffic. `internal: true` blocks external egress,
  # forcing worker outbound HTTPS through the credential-proxy.
  # gateway and credential-proxy hold fixed IPs for stable DNS and
  # for the worker's `dns:` directive.
  internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/24
  database:
    driver: bridge
    # Mongo is the only service solely on this network and needs no internet
    # egress, so isolate it (defense in depth). gateway + credential-proxy
    # keep their egress via the `external` network. (Subnet auto-allocated;
    # only `internal` needs a fixed subnet, for the proxy/gateway static IPs.)
    internal: true
  external:
    driver: bridge
  # The implicit default network - the volume-init + ui-extract oneshots
  # declare no networks, so they land here. They need no egress, so isolate
  # it too.
  default:
    driver: bridge
    internal: true
